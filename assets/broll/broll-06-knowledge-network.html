<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>AI Knowledge Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0e1a; font-family: 'Montserrat', sans-serif; position: relative; }

.bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 70% at 50% 50%, rgba(10,18,35,0.9) 0%, #0a0e1a 70%);
}

/* Subtle grid */
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 100px 100px;
}

/* Node styling */
.node {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10;
}

.node-circle {
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

.node-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid;
  animation: none;
}

.node-label {
  font-family: 'Roboto Mono', monospace; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  margin-top: 14px; text-align: center;
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.node-sub {
  font-family: 'Roboto Mono', monospace; font-size: 10px;
  color: rgba(106,125,146,0.7); letter-spacing: 2px; text-transform: uppercase;
  margin-top: 4px;
}

/* Central node */
.node-center {
  top: 50%; left: 50%;
  width: 180px; height: 180px;
}
.node-center .node-circle {
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(245,166,35,0.4) 0%, rgba(245,166,35,0.15) 60%, transparent 80%);
  box-shadow: 0 0 60px rgba(245,166,35,0.5), 0 0 120px rgba(245,166,35,0.2);
  border: 2px solid rgba(245,166,35,0.6);
}
.node-center .node-ring { width: 220px; height: 220px; border-color: rgba(245,166,35,0.2); }
.node-center .node-ring2 { position:absolute; width: 280px; height: 280px; border-radius:50%; border: 1px solid rgba(245,166,35,0.1); }
.node-center .node-label { font-size: 13px; color: #f5a623; margin-top: 0; }

/* Outer nodes */
.node-outer .node-circle {
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(0,212,255,0.25) 0%, rgba(0,212,255,0.08) 70%, transparent 100%);
  box-shadow: 0 0 40px rgba(0,212,255,0.3), 0 0 80px rgba(0,212,255,0.1);
  border: 1.5px solid rgba(0,212,255,0.5);
}
.node-outer .node-ring { width: 155px; height: 155px; border-color: rgba(0,212,255,0.15); }
.node-outer .node-label { font-size: 12px; color: #00d4ff; }

/* Mid nodes */
.node-mid .node-circle {
  width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(106,125,146,0.3) 0%, transparent 80%);
  border: 1px solid rgba(106,125,146,0.4);
  box-shadow: 0 0 20px rgba(106,125,146,0.2);
}
.node-mid .node-label { font-size: 10px; color: rgba(106,125,146,0.8); }

/* Central icon text */
.center-text {
  position: absolute; text-align: center;
  font-weight: 900; font-size: 14px; color: #f5a623;
  letter-spacing: 3px; line-height: 1.4;
}

/* Title */
.title {
  position: absolute; top: 50px; left: 50%;
  transform: translateX(-50%);
  text-align: center; z-index: 20;
}
.title-main {
  font-weight: 900; font-size: 48px; color: #fff;
  letter-spacing: 6px; text-transform: uppercase;
}
.title-main span { color: #f5a623; }
.title-sub {
  font-family: 'Roboto Mono', monospace; font-size: 16px;
  color: #6a7d92; letter-spacing: 5px; margin-top: 10px;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<!-- SVG connections underneath nodes -->
<svg style="position:absolute;inset:0;width:100%;height:100%;z-index:2" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Main spokes from center (960,540) to outer nodes -->
  <!-- To DATA (310, 270) -->
  <line x1="960" y1="540" x2="310" y2="270" stroke="#f5a623" stroke-width="1.5" opacity="0.5" filter="url(#lineGlow)"/>
  <!-- To INSIGHTS (1610, 270) -->
  <line x1="960" y1="540" x2="1610" y2="270" stroke="#f5a623" stroke-width="1.5" opacity="0.5" filter="url(#lineGlow)"/>
  <!-- To STRATEGY (1610, 810) -->
  <line x1="960" y1="540" x2="1610" y2="810" stroke="#f5a623" stroke-width="1.5" opacity="0.5" filter="url(#lineGlow)"/>
  <!-- To PROFIT (310, 810) -->
  <line x1="960" y1="540" x2="310" y2="810" stroke="#f5a623" stroke-width="1.5" opacity="0.5" filter="url(#lineGlow)"/>
  <!-- To AUTOMATION top center (960, 160) -->
  <line x1="960" y1="540" x2="960" y2="160" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- To CLIENTS bottom center (960, 920) -->
  <line x1="960" y1="540" x2="960" y2="920" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- Cross connections between outer nodes -->
  <line x1="310" y1="270" x2="1610" y2="270" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="1610" y1="270" x2="1610" y2="810" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="1610" y1="810" x2="310" y2="810" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="310" y1="810" x2="310" y2="270" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <!-- Diagonal cross -->
  <line x1="310" y1="270" x2="1610" y2="810" stroke="#6a7d92" stroke-width="0.5" opacity="0.12"/>
  <line x1="1610" y1="270" x2="310" y2="810" stroke="#6a7d92" stroke-width="0.5" opacity="0.12"/>
  <!-- Mid node connections -->
  <line x1="310" y1="270" x2="960" y2="160" stroke="#6a7d92" stroke-width="0.8" opacity="0.2"/>
  <line x1="1610" y1="270" x2="960" y2="160" stroke="#6a7d92" stroke-width="0.8" opacity="0.2"/>
  <line x1="310" y1="810" x2="960" y2="920" stroke="#6a7d92" stroke-width="0.8" opacity="0.2"/>
  <line x1="1610" y1="810" x2="960" y2="920" stroke="#6a7d92" stroke-width="0.8" opacity="0.2"/>
</svg>

<!-- Central node -->
<div class="node node-center" style="top:50%;left:50%;">
  <div class="node-circle">
    <div class="center-text">AI<br>CORE</div>
    <div class="node-ring"></div>
    <div class="node-ring2"></div>
  </div>
</div>

<!-- Outer nodes: corners -->
<div class="node node-outer" style="top:25%;left:16%;">
  <div class="node-circle"><span style="font-weight:900;font-size:14px;color:#00d4ff;letter-spacing:2px;">DATA</span><div class="node-ring"></div></div>
  <div class="node-label">Data</div>
  <div class="node-sub">Raw Intelligence</div>
</div>

<div class="node node-outer" style="top:25%;left:84%;">
  <div class="node-circle"><span style="font-weight:900;font-size:11px;color:#00d4ff;letter-spacing:1px;">INSIGHTS</span><div class="node-ring"></div></div>
  <div class="node-label">Insights</div>
  <div class="node-sub">Patterns Found</div>
</div>

<div class="node node-outer" style="top:75%;left:84%;">
  <div class="node-circle"><span style="font-weight:900;font-size:11px;color:#00d4ff;letter-spacing:1px;">STRATEGY</span><div class="node-ring"></div></div>
  <div class="node-label">Strategy</div>
  <div class="node-sub">AI Decisions</div>
</div>

<div class="node node-outer" style="top:75%;left:16%;">
  <div class="node-circle"><span style="font-weight:900;font-size:12px;color:#f5a623;letter-spacing:1px;">PROFIT</span><div class="node-ring" style="border-color:rgba(245,166,35,0.3);width:155px;height:155px;"></div></div>
  <div class="node-label" style="color:#f5a623;">Profit</div>
  <div class="node-sub">Business Outcome</div>
</div>

<!-- Mid nodes top/bottom -->
<div class="node node-mid" style="top:15%;left:50%;">
  <div class="node-circle"><span style="font-size:9px;color:#6a7d92;letter-spacing:1px;">AUTO</span></div>
  <div class="node-label">Automation</div>
</div>

<div class="node node-mid" style="top:85%;left:50%;">
  <div class="node-circle"><span style="font-size:9px;color:#6a7d92;letter-spacing:1px;">CRM</span></div>
  <div class="node-label">Clients</div>
</div>

<div class="title">
  <div class="title-main">AI <span>Knowledge</span> Network</div>
  <div class="title-sub">Intelligence Connecting Every Business Function</div>
</div>
</body>
</html>
