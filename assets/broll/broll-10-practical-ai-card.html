<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Practical AI Logo Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0e1a; font-family: 'Montserrat', sans-serif; position: relative; }

/* Background: geometric pattern */
.bg-pattern {
  position: absolute; inset: 0;
  background: #0a0e1a;
  overflow: hidden;
}

/* Geometric lines pattern */
.geo-svg {
  position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.07;
}

/* Radial center glow */
.center-radial {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 900px; height: 900px; border-radius: 50%;
  background: radial-gradient(circle,
    rgba(245,166,35,0.08) 0%,
    rgba(245,166,35,0.04) 30%,
    rgba(0,212,255,0.02) 60%,
    transparent 75%);
}

/* Ambient orbs */
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(100px);
}
.orb-1 {
  width: 600px; height: 600px;
  background: rgba(245,166,35,0.06);
  top: -100px; left: -100px;
}
.orb-2 {
  width: 500px; height: 500px;
  background: rgba(0,212,255,0.05);
  bottom: -100px; right: -100px;
}
.orb-3 {
  width: 400px; height: 400px;
  background: rgba(245,166,35,0.04);
  bottom: 100px; left: 300px;
}

/* Decorative lines top/bottom */
.deco-line-top {
  position: absolute; top: 120px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(245,166,35,0.3) 20%, rgba(245,166,35,0.5) 50%, rgba(245,166,35,0.3) 80%, transparent 100%);
}
.deco-line-bottom {
  position: absolute; bottom: 120px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.2) 20%, rgba(0,212,255,0.4) 50%, rgba(0,212,255,0.2) 80%, transparent 100%);
}

/* Corner decorations */
.corner {
  position: absolute; width: 60px; height: 60px;
}
.corner.tl { top: 50px; left: 80px; border-top: 2px solid rgba(245,166,35,0.4); border-left: 2px solid rgba(245,166,35,0.4); }
.corner.tr { top: 50px; right: 80px; border-top: 2px solid rgba(245,166,35,0.4); border-right: 2px solid rgba(245,166,35,0.4); }
.corner.bl { bottom: 50px; left: 80px; border-bottom: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3); }
.corner.br { bottom: 50px; right: 80px; border-bottom: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3); }

/* Center content */
.center-content {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; z-index: 10;
}

/* AI circuit badge above */
.badge {
  display: inline-block;
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 4px; padding: 8px 24px;
  font-family: 'Roboto Mono', monospace; font-size: 14px;
  color: #00d4ff; letter-spacing: 8px; text-transform: uppercase;
  margin-bottom: 30px;
}

/* Main title */
.main-title {
  font-weight: 900;
  font-size: 160px;
  color: #f5a623;
  letter-spacing: 8px;
  line-height: 1;
  text-transform: uppercase;
  text-shadow:
    0 0 60px rgba(245,166,35,0.6),
    0 0 120px rgba(245,166,35,0.25),
    0 0 200px rgba(245,166,35,0.1);
  position: relative;
}

/* The word "PRACTICAL" slightly smaller / lighter */
.word-practical {
  display: block;
  font-weight: 300;
  font-size: 80px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 24px;
  text-shadow: none;
  margin-bottom: 10px;
}

/* Gold divider */
.gold-divider {
  width: 560px; height: 5px; margin: 28px auto;
  background: linear-gradient(90deg, transparent, #f5a623 15%, #f5a623 85%, transparent);
  box-shadow: 0 0 30px rgba(245,166,35,0.7), 0 0 60px rgba(245,166,35,0.25);
  border-radius: 3px;
}

/* Tagline */
.tagline {
  font-weight: 700; font-size: 28px; color: #fff;
  letter-spacing: 6px; text-transform: uppercase;
  opacity: 0.7; margin-top: 6px;
}

/* Sub-tagline */
.sub-tagline {
  font-family: 'Roboto Mono', monospace; font-size: 16px;
  color: #6a7d92; letter-spacing: 5px; margin-top: 16px;
}

/* Bottom row of icons/pills */
.pillrow {
  display: flex; justify-content: center; gap: 24px; margin-top: 40px;
}
.pill {
  background: rgba(13,21,48,0.7);
  border: 1px solid rgba(106,125,146,0.25);
  border-radius: 40px; padding: 10px 24px;
  font-family: 'Roboto Mono', monospace; font-size: 12px;
  color: rgba(106,125,146,0.7); letter-spacing: 3px;
}
.pill.active {
  border-color: rgba(245,166,35,0.4);
  color: rgba(245,166,35,0.8);
  background: rgba(245,166,35,0.06);
}

/* Author credit bottom center */
.author {
  position: absolute; bottom: 55px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Roboto Mono', monospace; font-size: 14px;
  color: rgba(106,125,146,0.5); letter-spacing: 4px;
  text-transform: uppercase; z-index: 10;
  white-space: nowrap;
}

/* Floating particles */
.particles { position: absolute; inset: 0; z-index: 3; }
</style>
</head>
<body>
<!-- Background pattern -->
<div class="bg-pattern">
  <svg class="geo-svg" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
    <!-- Diagonal grid lines -->
    <g stroke="#f5a623" stroke-width="0.8">
      <!-- Diagonal set 1 -->
      <line x1="-200" y1="0" x2="1080" y2="1280"/>
      <line x1="0" y1="0" x2="1280" y2="1280"/>
      <line x1="200" y1="0" x2="1480" y2="1280"/>
      <line x1="400" y1="0" x2="1680" y2="1280"/>
      <line x1="600" y1="0" x2="1880" y2="1280"/>
      <line x1="800" y1="0" x2="2080" y2="1280"/>
      <line x1="1000" y1="0" x2="2280" y2="1280"/>
      <line x1="1200" y1="0" x2="2480" y2="1280"/>
      <line x1="1400" y1="0" x2="2680" y2="1280"/>
      <!-- Diagonal set 2 (opposing) -->
      <line x1="2120" y1="0" x2="840" y2="1280"/>
      <line x1="1920" y1="0" x2="640" y2="1280"/>
      <line x1="1720" y1="0" x2="440" y2="1280"/>
      <line x1="1520" y1="0" x2="240" y2="1280"/>
      <line x1="1320" y1="0" x2="40" y2="1280"/>
      <line x1="1120" y1="0" x2="-160" y2="1280"/>
      <line x1="920" y1="0" x2="-360" y2="1280"/>
    </g>
    <!-- Concentric diamond outlines -->
    <g fill="none" stroke="#00d4ff" stroke-width="0.8">
      <polygon points="960,140 1700,540 960,940 220,540" opacity="0.5"/>
      <polygon points="960,220 1600,540 960,860 320,540" opacity="0.35"/>
      <polygon points="960,310 1490,540 960,770 430,540" opacity="0.2"/>
    </g>
    <!-- Horizontal subtle lines -->
    <g stroke="rgba(106,125,146,0.3)" stroke-width="0.5">
      <line x1="0" y1="270" x2="1920" y2="270"/>
      <line x1="0" y1="540" x2="1920" y2="540"/>
      <line x1="0" y1="810" x2="1920" y2="810"/>
    </g>
  </svg>
</div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="center-radial"></div>

<div class="deco-line-top"></div>
<div class="deco-line-bottom"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="center-content">
  <div class="badge">Scott Magnacca &nbsp;·&nbsp; Business AI Trainer</div>

  <div class="main-title">
    <span class="word-practical">Practical</span>
    AI
  </div>

  <div class="gold-divider"></div>

  <div class="tagline">For Business Professionals</div>
  <div class="sub-tagline">Master the tools that multiply your results</div>

  <div class="pillrow">
    <div class="pill active">Sales</div>
    <div class="pill active">Productivity</div>
    <div class="pill">Communication</div>
    <div class="pill">Research</div>
    <div class="pill active">Revenue</div>
  </div>
</div>

<div class="author">practicalai.scottmagnacca.com</div>

<div class="particles" id="particles"></div>

<script>
const container = document.getElementById('particles');
for(let i = 0; i < 50; i++) {
  const p = document.createElement('div');
  const size = Math.random() * 3 + 1;
  const isGold = Math.random() > 0.6;
  p.style.cssText = `position:absolute;border-radius:50%;width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;background:${isGold?'rgba(245,166,35,0.7)':'rgba(0,212,255,0.5)'};box-shadow:0 0 ${size*4}px ${isGold?'rgba(245,166,35,0.7)':'rgba(0,212,255,0.6)'};opacity:${Math.random()*0.7+0.1}`;
  container.appendChild(p);
}
</script>
</body>
</html>
