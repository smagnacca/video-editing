<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Sales Funnel AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0e1a; font-family: 'Montserrat', sans-serif; position: relative; }

.bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 0%, rgba(13,21,48,0.8) 0%, #0a0e1a 65%);
}

/* Top label */
.top-label {
  position: absolute; top: 60px; left: 50%;
  transform: translateX(-50%);
  font-weight: 900; font-size: 42px; color: #fff;
  letter-spacing: 8px; text-transform: uppercase; z-index: 10;
  text-align: center;
}
.top-label span { color: #f5a623; }
.top-sublabel {
  position: absolute; top: 128px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Roboto Mono', monospace; font-size: 16px;
  color: #6a7d92; letter-spacing: 5px; z-index: 10;
}

/* Funnel container */
.funnel-wrap {
  position: absolute; top: 180px; left: 50%;
  transform: translateX(-50%);
  width: 900px;
  z-index: 5;
}

/* Funnel section */
.funnel-section {
  position: relative; margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
}

.funnel-label-left, .funnel-label-right {
  position: absolute;
  font-family: 'Roboto Mono', monospace; font-size: 13px;
  color: #6a7d92; letter-spacing: 3px;
}
.funnel-label-left { right: calc(100% + 30px); white-space: nowrap; }
.funnel-label-right { left: calc(100% + 30px); white-space: nowrap; }

/* Funnel tiers using clip-path trapezoids */
.tier {
  display: flex; align-items: center; justify-content: center;
  position: relative;
  height: 140px;
  clip-path: polygon(5% 0%, 95% 0%, 100% 100%, 0% 100%);
}
.tier-label {
  font-weight: 900; font-size: 32px; letter-spacing: 6px;
  text-transform: uppercase; color: #fff; z-index: 2;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
.tier-count {
  position: absolute; right: 24px;
  font-family: 'Roboto Mono', monospace; font-size: 14px;
  color: rgba(255,255,255,0.5); letter-spacing: 2px;
}

/* Tier 1 - Leads (widest) */
.tier-1 {
  width: 900px;
  background: linear-gradient(135deg, rgba(245,166,35,0.5) 0%, rgba(245,166,35,0.8) 50%, rgba(245,166,35,0.5) 100%);
  border-top: 2px solid rgba(245,166,35,0.6);
  box-shadow: 0 0 60px rgba(245,166,35,0.3), inset 0 0 40px rgba(245,166,35,0.1);
  clip-path: polygon(0% 0%, 100% 0%, 94% 100%, 6% 100%);
}

/* Tier 2 - Prospects */
.tier-2 {
  width: 720px;
  background: linear-gradient(135deg, rgba(245,166,35,0.35) 0%, rgba(0,212,255,0.35) 50%, rgba(245,166,35,0.2) 100%);
  border-top: 2px solid rgba(0,212,255,0.4);
  box-shadow: 0 0 50px rgba(0,212,255,0.2), inset 0 0 30px rgba(0,212,255,0.08);
  clip-path: polygon(0% 0%, 100% 0%, 93% 100%, 7% 100%);
}

/* Tier 3 - Qualified */
.tier-3 {
  width: 550px;
  background: linear-gradient(135deg, rgba(0,212,255,0.3) 0%, rgba(0,212,255,0.55) 50%, rgba(0,212,255,0.3) 100%);
  border-top: 2px solid rgba(0,212,255,0.5);
  box-shadow: 0 0 50px rgba(0,212,255,0.25), inset 0 0 30px rgba(0,212,255,0.1);
  clip-path: polygon(0% 0%, 100% 0%, 92% 100%, 8% 100%);
}

/* Tier 4 - Clients (narrowest) */
.tier-4 {
  width: 380px;
  background: linear-gradient(135deg, rgba(0,212,255,0.4) 0%, rgba(0,212,255,0.7) 50%, rgba(0,212,255,0.4) 100%);
  border-top: 2px solid rgba(0,212,255,0.7);
  box-shadow: 0 0 60px rgba(0,212,255,0.4), inset 0 0 40px rgba(0,212,255,0.15);
  clip-path: polygon(0% 0%, 100% 0%, 88% 100%, 12% 100%);
}

/* Bottom point */
.funnel-point {
  width: 8px; height: 60px; margin: 0 auto;
  background: linear-gradient(0deg, transparent, rgba(0,212,255,0.7));
  position: relative;
}
.funnel-point::after {
  content: '';
  position: absolute; bottom: -20px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-top: 20px solid rgba(0,212,255,0.7);
}

/* Flow lines on sides */
.flow-line {
  position: absolute; width: 3px;
  background: linear-gradient(0deg, rgba(0,212,255,0.8), rgba(245,166,35,0.8));
  box-shadow: 0 0 10px rgba(0,212,255,0.5);
  top: 0; bottom: 0;
}
.flow-line.left { left: -60px; }
.flow-line.right { right: -60px; }

/* Arrow indicators */
.arrows {
  position: absolute; right: -220px; top: 0; bottom: 0;
  display: flex; flex-direction: column; justify-content: space-around;
  align-items: flex-start;
}
.arrow-item { display: flex; align-items: center; gap: 10px; }
.arrow-icon {
  width: 24px; height: 24px; color: #f5a623;
  font-size: 20px; font-weight: 900;
}
.arrow-text {
  font-family: 'Roboto Mono', monospace; font-size: 12px;
  color: #6a7d92; letter-spacing: 2px;
}

/* Glow drop at bottom */
.bottom-glow {
  position: absolute; bottom: -20px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 80px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(0,212,255,0.4) 0%, transparent 70%);
  filter: blur(20px);
}

/* Stats row */
.stats-row {
  position: absolute; bottom: 60px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 80px; z-index: 10;
}
.stat { text-align: center; }
.stat-num { font-weight: 900; font-size: 52px; color: #f5a623; letter-spacing: 2px; }
.stat-label { font-family: 'Roboto Mono', monospace; font-size: 12px; color: #6a7d92; letter-spacing: 4px; margin-top: 6px; }
</style>
</head>
<body>
<div class="bg"></div>

<div class="top-label">AI Sales <span>Funnel</span></div>
<div class="top-sublabel">From Cold Lead to Closed Client — Automated</div>

<div class="funnel-wrap">
  <!-- Tier 1 -->
  <div class="funnel-section" style="margin-bottom:-2px;">
    <div class="tier tier-1">
      <div class="tier-label">LEADS</div>
      <div class="tier-count">10,000+</div>
    </div>
    <span class="funnel-label-right" style="color:rgba(245,166,35,0.7);">AI IDENTIFIES</span>
  </div>

  <!-- Tier 2 -->
  <div class="funnel-section" style="margin-bottom:-2px;">
    <div class="tier tier-2">
      <div class="tier-label">PROSPECTS</div>
      <div class="tier-count">2,400</div>
    </div>
    <span class="funnel-label-right">AI QUALIFIES</span>
  </div>

  <!-- Tier 3 -->
  <div class="funnel-section" style="margin-bottom:-2px;">
    <div class="tier tier-3">
      <div class="tier-label">QUALIFIED</div>
      <div class="tier-count">480</div>
    </div>
    <span class="funnel-label-right">AI NURTURES</span>
  </div>

  <!-- Tier 4 -->
  <div class="funnel-section" style="margin-bottom:-2px;">
    <div class="tier tier-4">
      <div class="tier-label">CLIENTS</div>
      <div class="tier-count">120</div>
    </div>
    <span class="funnel-label-right" style="color:rgba(0,212,255,0.8);">AI CLOSES</span>
  </div>

  <div class="funnel-point"></div>
  <div class="bottom-glow"></div>
</div>

<div class="stats-row">
  <div class="stat">
    <div class="stat-num">1.2%</div>
    <div class="stat-label">Close Rate</div>
  </div>
  <div class="stat">
    <div class="stat-num">47×</div>
    <div class="stat-label">Scale Factor</div>
  </div>
  <div class="stat">
    <div class="stat-num">$2.4M</div>
    <div class="stat-label">Pipeline Generated</div>
  </div>
  <div class="stat">
    <div class="stat-num">73%</div>
    <div class="stat-label">Time Automated</div>
  </div>
</div>
</body>
</html>
