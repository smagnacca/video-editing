<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Productivity 3x</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0e1a; font-family: 'Montserrat', sans-serif; position: relative; }

.bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 60% at 50% 50%, rgba(0,212,255,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 100% 80% at 50% 100%, rgba(10,20,40,0.9) 0%, #0a0e1a 60%);
}

/* Particle field */
.particles { position: absolute; inset: 0; }

/* Grid overlay */
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(0,0,0,0.6) 0%, transparent 100%);
}

/* Central glow */
.center-glow {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
}

/* The big number */
.main-number {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  text-align: center;
  z-index: 10;
}
.number-3x {
  font-weight: 900;
  font-size: 420px;
  color: #00d4ff;
  line-height: 0.9;
  letter-spacing: -20px;
  text-shadow:
    0 0 80px rgba(0,212,255,0.8),
    0 0 160px rgba(0,212,255,0.4),
    0 0 300px rgba(0,212,255,0.15);
  position: relative;
  z-index: 5;
}
.number-3x .x-mark {
  color: rgba(0,212,255,0.7);
  font-size: 320px;
  vertical-align: super;
  margin-left: -10px;
}

/* Gold underline */
.gold-line {
  width: 560px; height: 6px;
  background: linear-gradient(90deg, transparent, #f5a623 20%, #f5a623 80%, transparent);
  margin: 0 auto;
  box-shadow: 0 0 30px rgba(245,166,35,0.8), 0 0 60px rgba(245,166,35,0.3);
  border-radius: 3px;
  margin-top: 10px;
}

/* Rings behind number */
.ring {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%; border: 1px solid rgba(0,212,255,0.12);
}

/* Labels */
.label-top {
  position: absolute; top: 100px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Roboto Mono', monospace; font-weight: 500;
  font-size: 18px; color: #6a7d92; letter-spacing: 8px;
  text-transform: uppercase;
  text-align: center;
}

.text-block {
  position: absolute; bottom: 100px; left: 50%;
  transform: translateX(-50%);
  text-align: center; z-index: 10;
}
.headline {
  font-weight: 900; font-size: 56px; color: #fff;
  letter-spacing: 6px; text-transform: uppercase;
  text-shadow: 0 2px 40px rgba(0,0,0,0.8);
}
.headline span { color: #f5a623; }
.tagline {
  font-family: 'Roboto Mono', monospace; font-size: 20px;
  color: #6a7d92; letter-spacing: 4px; margin-top: 14px;
}

/* Stat pills on sides */
.side-stat {
  position: absolute; top: 50%;
  transform: translateY(-50%);
  z-index: 10;
}
.side-stat.left { left: 140px; }
.side-stat.right { right: 140px; }
.stat-card {
  background: rgba(13,21,48,0.8);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 8px; padding: 24px 30px;
  margin-bottom: 24px; text-align: center;
}
.stat-num { font-weight: 900; font-size: 48px; color: #f5a623; letter-spacing: 2px; }
.stat-desc { font-family: 'Roboto Mono', monospace; font-size: 11px; color: #6a7d92; letter-spacing: 3px; margin-top: 6px; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<!-- Rings -->
<div class="ring" style="width:500px;height:500px;opacity:0.6"></div>
<div class="ring" style="width:700px;height:700px;opacity:0.4"></div>
<div class="ring" style="width:900px;height:900px;opacity:0.25"></div>
<div class="ring" style="width:1100px;height:1100px;opacity:0.12"></div>

<div class="center-glow"></div>

<div class="label-top">AI-Powered Productivity Multiplier</div>

<div class="main-number">
  <div class="number-3x">3<span class="x-mark">×</span></div>
  <div class="gold-line"></div>
</div>

<div class="side-stat left">
  <div class="stat-card">
    <div class="stat-num">10+</div>
    <div class="stat-desc">HRS SAVED<br>PER WEEK</div>
  </div>
  <div class="stat-card">
    <div class="stat-num">47%</div>
    <div class="stat-desc">FASTER<br>DECISIONS</div>
  </div>
</div>

<div class="side-stat right">
  <div class="stat-card">
    <div class="stat-num">$40K</div>
    <div class="stat-desc">AVG ANNUAL<br>VALUE ADDED</div>
  </div>
  <div class="stat-card">
    <div class="stat-num">92%</div>
    <div class="stat-desc">USER<br>SATISFACTION</div>
  </div>
</div>

<div class="text-block">
  <div class="headline">More Output. <span>Same Team.</span></div>
  <div class="tagline">Practical AI for Business Professionals</div>
</div>

<div class="particles" id="particles"></div>

<script>
const container = document.getElementById('particles');
for(let i = 0; i < 80; i++) {
  const p = document.createElement('div');
  const size = Math.random() * 4 + 1;
  const isCyan = Math.random() > 0.5;
  p.style.cssText = `position:absolute;border-radius:50%;width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;background:${isCyan?'rgba(0,212,255,0.6)':'rgba(245,166,35,0.5)'};box-shadow:0 0 ${size*3}px ${isCyan?'rgba(0,212,255,0.6)':'rgba(245,166,35,0.6)'};opacity:${Math.random()*0.6+0.1}`;
  container.appendChild(p);
}
</script>
</body>
</html>
